<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vexora — Advertise. Earn. Grow.</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg:      #030b18;
  --card:    #071020;
  --card2:   #04090f;
  --border:  #1a2e4a;
  --gold:    #c9a227;
  --gold2:   #f0d060;
  --navy:    #0d1f3c;
  --grad:    linear-gradient(135deg, #c9a227 0%, #f0d060 60%, #c9a227 100%);
  --grad2:   linear-gradient(135deg, #0d2a52 0%, #0a1628 100%);
  --muted:   #5a7090;
  --text:    #d8e8ff;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { min-height:100%; font-family:'Nunito',sans-serif; background:var(--bg); color:#fff; overflow-x:hidden; -webkit-font-smoothing:antialiased; }

/* ── Background ── */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    linear-gradient(rgba(201,162,39,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,162,39,0.03) 1px, transparent 1px);
  background-size:44px 44px;
}
body::after {
  content:''; position:fixed; top:-15%; left:50%; transform:translateX(-50%);
  width:700px; height:600px; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse, rgba(201,162,39,0.07) 0%, rgba(13,31,60,0.12) 50%, transparent 75%);
}

/* ── LAYOUT ── */
.wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px 16px; position:relative; z-index:1; }

/* ── CARD ── */
.card {
  width:100%; max-width:400px;
  background: linear-gradient(160deg, #081526 0%, #040d1a 100%);
  border:1px solid rgba(201,162,39,0.18);
  border-radius:28px;
  padding:36px 24px 30px;
  box-shadow:
    0 0 0 1px rgba(201,162,39,0.04),
    0 0 60px rgba(201,162,39,0.06),
    0 24px 60px rgba(0,0,0,0.6);
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute; top:-80px; left:50%; transform:translateX(-50%);
  width:260px; height:260px;
  background:radial-gradient(circle, rgba(201,162,39,0.10) 0%, transparent 70%);
  pointer-events:none;
}

/* ── LOGO ── */
.logo-block { text-align:center; margin-bottom:28px; }
.logo-img-wrap {
  width:84px; height:84px; margin:0 auto 14px;
  border-radius:22px;
  border:2px solid rgba(201,162,39,0.35);
  overflow:hidden;
  box-shadow:0 0 36px rgba(201,162,39,0.22), 0 10px 28px rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center;
  background:#071020;
}
.logo-img-wrap img { width:100%; height:100%; object-fit:cover; border-radius:20px; }
.logo-name {
  font-family:'Rajdhani',sans-serif; font-size:34px; font-weight:700;
  letter-spacing:5px; text-transform:uppercase;
  background: var(--grad);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  text-shadow: none;
  line-height:1;
}
.logo-tag { font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:2px; text-transform:uppercase; }

/* ── GOLD DIVIDER ── */
.gold-line {
  width:60px; height:2px; margin:14px auto 22px;
  background: var(--grad);
  border-radius:2px;
}

/* ── DESCRIPTION ── */
.desc { font-size:13px; color:#7a9bbf; text-align:center; line-height:1.75; margin-bottom:26px; }
.desc span { color:#e8c547; font-weight:800; }

/* ── PLATFORM GRID ── */
.platform-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:28px; }
.plat-item {
  background:rgba(4,9,15,0.8);
  border:1px solid rgba(201,162,39,0.12);
  border-radius:14px;
  padding:13px 6px; text-align:center; font-size:10px; color:var(--muted);
  font-weight:700; letter-spacing:0.5px; transition:0.25s;
}
.plat-item:hover { border-color:rgba(201,162,39,0.4); color:#e8c547; background:rgba(201,162,39,0.04); }
.plat-item .pi { font-size:20px; display:block; margin-bottom:5px; }

/* ── DIVIDER ── */
.divider { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.divider span { flex:1; height:1px; background:rgba(201,162,39,0.15); }
.divider p { font-size:10px; color:var(--gold); font-weight:800; letter-spacing:2px; text-transform:uppercase; }

/* ── BUTTONS ── */
.btn-start {
  display:block; width:100%; padding:16px;
  background: linear-gradient(135deg, #b8891e 0%, #e8c547 50%, #b8891e 100%);
  color:#0a1628;
  text-decoration:none; border-radius:15px;
  font-family:'Rajdhani',sans-serif; font-size:17px; font-weight:700; letter-spacing:2px; text-transform:uppercase; text-align:center;
  box-shadow:0 4px 28px rgba(201,162,39,0.35), 0 2px 8px rgba(0,0,0,0.3);
  transition:0.25s; margin-bottom:12px;
}
.btn-start:hover { box-shadow:0 6px 36px rgba(201,162,39,0.5); }
.btn-start:active { transform:scale(0.97); }

.btn-outline {
  display:block; width:100%; padding:14px;
  background:transparent; border:1px solid rgba(201,162,39,0.25);
  color:var(--gold2); text-decoration:none; border-radius:15px;
  font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; letter-spacing:1.5px; text-align:center;
  transition:0.25s;
}
.btn-outline:hover { border-color:rgba(201,162,39,0.5); background:rgba(201,162,39,0.05); }
.btn-outline:active { transform:scale(0.97); }

/* ── BADGE ROW ── */
.badge-row { display:flex; gap:8px; justify-content:center; margin-top:22px; flex-wrap:wrap; }
.badge {
  background:rgba(4,9,15,0.9); border:1px solid rgba(201,162,39,0.15);
  border-radius:20px; padding:6px 13px; font-size:10px; color:var(--muted);
  font-weight:700; display:flex; align-items:center; gap:5px;
}
.badge i { color:var(--gold); }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="logo-block">
      <div class="logo-img-wrap">
        <img src="logo.jpeg" alt="Vexora Logo">
      </div>
      <div class="logo-name">Vexora</div>
      <div class="gold-line"></div>
      <div class="logo-tag">Advertise &bull; Earn &bull; Grow</div>
    </div>

    <p class="desc">
      Pakistan's next-gen digital earning platform.<br>
      Complete <span>Ad tasks</span> and earn <span>real cash</span> — daily, instantly.
    </p>

    <div class="platform-grid">
      <div class="plat-item"><span class="pi">🌐</span>Google</div>
      <div class="plat-item"><span class="pi">🎬</span>YouTube</div>
      <div class="plat-item"><span class="pi">👤</span>Facebook</div>
      <div class="plat-item"><span class="pi">🎵</span>TikTok</div>
      <div class="plat-item"><span class="pi">📷</span>Instagram</div>
      <div class="plat-item"><span class="pi">💼</span>LinkedIn</div>
    </div>

    <div class="divider"><span></span><p>Get Started</p><span></span></div>

    <a href="auth.html" class="btn-start">
      <i class="fas fa-rocket"></i>&nbsp; Start Earning Now
    </a>
    <a href="#" class="btn-outline">
      <i class="fa-brands fa-android"></i>&nbsp; Download App
    </a>

    <div class="badge-row">
      <div class="badge"><i class="fas fa-shield-halved"></i>Secure</div>
      <div class="badge"><i class="fas fa-bolt"></i>Instant Pay</div>
      <div class="badge"><i class="fas fa-users"></i>Referral Bonus</div>
    </div>

  </div>
</div>
</body>
</html>
