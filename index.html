<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vexora Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;}

/* ════ BACKGROUND ════ */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, #0e264d 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 50% 110%, #08162e 0%, transparent 70%),
    #020810;
}

/* Animated grid */
.bg-grid{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(201,162,39,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,162,39,0.04) 1px, transparent 1px);
  background-size:48px 48px;
  animation:gridDrift 30s linear infinite;
}
@keyframes gridDrift{ from{background-position:0 0;} to{background-position:48px 48px;} }

/* Center radial pulse */
.glow-center{
  position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);
  width:600px;height:600px;border-radius:50%;z-index:2;pointer-events:none;
  background:radial-gradient(circle, rgba(201,162,39,0.12) 0%, rgba(14,38,77,0.08) 40%, transparent 68%);
  animation:pulseGlow 4.5s ease-in-out infinite;
}
@keyframes pulseGlow{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.9;}
  50%    {transform:translate(-50%,-50%) scale(1.15);opacity:0.6;}
}

/* Scan lines */
.scanlines{
  position:fixed;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

/* ════ CIRCUIT SVG ════ */
.circuit-svg{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.15;}

/* ════ PARTICLES ════ */
.particles{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden;}
.p{
  position:absolute;border-radius:50%;
  background:rgba(201,162,39,0.7);
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%  {transform:translateY(0) scale(1);opacity:0;}
  10% {opacity:1;}
  85% {opacity:0.5;}
  100%{transform:translateY(-100vh) scale(0.3);opacity:0;}
}

/* ════ PAGE LAYOUT ════ */
.page{
  position:relative;z-index:10;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;
  padding:0 22px;
}

/* ── TOP STRIP ── */
.top-strip{
  width:100%;display:flex;justify-content:center;
  padding-top:max(18px, env(safe-area-inset-top));
  opacity:0;animation:fadeDown 0.8s 0.3s ease forwards;
}
.live-badge{
  display:flex;align-items:center;gap:8px;
  background:rgba(201,162,39,0.07);
  border:1px solid rgba(201,162,39,0.2);
  border-radius:30px;padding:7px 18px;
  font-size:11px;font-weight:800;color:rgba(220,185,80,0.85);
  letter-spacing:1.8px;text-transform:uppercase;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:#c9a227;
  box-shadow:0 0 10px rgba(201,162,39,0.9);
  animation:livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse{
  0%,100%{box-shadow:0 0 8px rgba(201,162,39,0.9);}
  50%    {box-shadow:0 0 20px rgba(201,162,39,0.6);transform:scale(1.3);}
}

/* ── CENTER BLOCK ── */
.center-block{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:8px 0 0;
}

/* ── LOGO ── */
.logo-wrap{
  position:relative;margin-bottom:22px;
  opacity:0;animation:zoomIn 1.1s 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.ring1{
  position:absolute;inset:-20px;border-radius:40px;
  border:1px solid rgba(201,162,39,0.2);
  animation:ringPulse 3.5s ease-in-out infinite;
}
.ring2{
  position:absolute;inset:-40px;border-radius:52px;
  border:1px solid rgba(201,162,39,0.07);
  animation:ringPulse 3.5s 1.2s ease-in-out infinite;
}
.ring3{
  position:absolute;inset:-62px;border-radius:66px;
  border:1px solid rgba(201,162,39,0.03);
  animation:ringPulse 3.5s 2.2s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%    {opacity:0.3;transform:scale(1.04);}
}
.logo-img{
  width:140px;height:140px;border-radius:28px;
  object-fit:cover;display:block;position:relative;z-index:1;
  box-shadow:
    0 0 0 1.5px rgba(201,162,39,0.3),
    0 0 50px rgba(201,162,39,0.28),
    0 0 100px rgba(201,162,39,0.10),
    0 20px 60px rgba(0,0,0,0.75);
}
.logo-shine{
  position:absolute;inset:0;border-radius:28px;z-index:2;
  background:linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 50%);
  pointer-events:none;
}

/* ── NAME ── */
.name-wrap{
  opacity:0;animation:fadeUp 0.9s 1.1s ease forwards;
  margin-bottom:6px;
}
.app-name{
  font-family:'Orbitron',sans-serif;font-size:clamp(28px,9vw,42px);font-weight:900;
  letter-spacing:clamp(4px,2vw,8px);text-transform:uppercase;line-height:1;
  background:linear-gradient(135deg, #b8891e 0%, #d4a830 20%, #f5d870 50%, #d4a830 80%, #b8891e 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:nameShimmer 4s 2s linear infinite;
  filter:drop-shadow(0 0 24px rgba(201,162,39,0.35));
}
@keyframes nameShimmer{
  0%{background-position:0% center;}
  100%{background-position:200% center;}
}
.pro-tag{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:10px;text-transform:uppercase;
  color:rgba(201,162,39,0.4);margin-top:3px;display:block;
}

/* ── TAGLINE ── */
.tagline{
  opacity:0;animation:fadeUp 0.9s 1.3s ease forwards;
  font-size:11px;font-weight:800;
  color:rgba(130,165,210,0.5);
  letter-spacing:2.5px;text-transform:uppercase;
  margin-bottom:26px;
}

/* ── STATS ── */
.stats-row{
  display:flex;gap:0;width:100%;max-width:340px;
  opacity:0;animation:fadeUp 0.9s 1.5s ease forwards;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(201,162,39,0.13);
  border-radius:16px;overflow:hidden;
}
.stat{flex:1;padding:13px 6px;text-align:center;border-right:1px solid rgba(201,162,39,0.09);}
.stat:last-child{border-right:none;}
.stat-val{
  font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;
  color:#e8c547;line-height:1;margin-bottom:5px;
}
.stat-lbl{font-size:8.5px;font-weight:800;color:rgba(100,140,180,0.6);text-transform:uppercase;letter-spacing:0.8px;}

/* ════ BOTTOM BLOCK ════ */
.bottom-block{
  width:100%;max-width:400px;
  padding-bottom:max(24px,env(safe-area-inset-bottom));
  opacity:0;animation:fadeUp 0.9s 1.8s ease forwards;
}

/* Trust row */
.trust-row{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:16px;
}
.trust-item{
  display:flex;align-items:center;gap:5px;
  font-size:9.5px;font-weight:800;
  color:rgba(140,170,210,0.45);text-transform:uppercase;letter-spacing:0.5px;
}
.trust-item i{color:rgba(201,162,39,0.5);font-size:10px;}
.trust-sep{width:3px;height:3px;border-radius:50%;background:rgba(201,162,39,0.2);}

/* ── START BUTTON ── */
.btn-start{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:16px 18px;
  background:linear-gradient(135deg, #9b6e14 0%, #c9a227 25%, #f0d060 55%, #c9a227 80%, #9b6e14 100%);
  background-size:200% 100%;
  color:#07100a;
  text-decoration:none;border-radius:16px;
  box-shadow:
    0 0 0 1px rgba(201,162,39,0.25),
    0 8px 36px rgba(201,162,39,0.42),
    0 2px 8px rgba(0,0,0,0.5);
  margin-bottom:11px;position:relative;overflow:hidden;
  transition:transform 0.15s,box-shadow 0.15s;
  animation:btnPulse 3s 3s ease-in-out infinite;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 0 1px rgba(201,162,39,0.25),0 8px 36px rgba(201,162,39,0.42),0 2px 8px rgba(0,0,0,0.5);}
  50%    {box-shadow:0 0 0 1px rgba(201,162,39,0.35),0 8px 48px rgba(201,162,39,0.6),0 2px 8px rgba(0,0,0,0.5);}
}
.btn-start::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 25%,rgba(255,255,255,0.22) 50%,transparent 75%);
  transform:translateX(-100%);
  animation:shine 3.5s 3s ease-in-out infinite;
}
@keyframes shine{
  0%,80%,100%{transform:translateX(-100%);}
  40%{transform:translateX(200%);}
}
.btn-start:active{transform:scale(0.97);}
.btn-ico{
  width:38px;height:38px;border-radius:12px;
  background:rgba(0,0,0,0.18);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-ico i{font-size:17px;color:#06100d;}
.btn-texts{flex:1;text-align:left;}
.btn-main{
  font-family:'Orbitron',sans-serif;font-size:12.5px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;display:block;line-height:1.2;
  color:#06100d;
}
.btn-sub{
  font-size:9px;font-weight:800;color:rgba(0,0,0,0.45);
  letter-spacing:1px;text-transform:uppercase;display:block;margin-top:2px;
}
.btn-arr{color:rgba(0,0,0,0.35);font-size:13px;flex-shrink:0;}

/* ── DOWNLOAD BUTTON ── */
.btn-dl{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:14px 18px;
  background:rgba(255,255,255,0.025);
  border:1px solid rgba(201,162,39,0.18);
  color:rgba(201,162,39,0.75);
  text-decoration:none;border-radius:16px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;
  transition:0.2s;
}
.btn-dl:hover{border-color:rgba(201,162,39,0.4);background:rgba(201,162,39,0.05);}
.btn-dl:active{transform:scale(0.97);}
.btn-dl i{font-size:17px;}
.dl-right{margin-left:auto;font-size:10px;opacity:0.35;}

/* Footer */
.foot{
  text-align:center;margin-top:13px;
  font-size:8.5px;color:rgba(100,130,160,0.3);
  letter-spacing:2px;text-transform:uppercase;font-weight:700;
}

/* ════ UTIL ANIMATIONS ════ */
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes zoomIn  {from{opacity:0;transform:scale(0.55);}to{opacity:1;transform:scale(1);}}
</style>
</head>
<body>

<div class="bg"></div>

<script>
// Particles
(function(){
  const c=document.getElementById("ptcl");
  for(let i=0;i<24;i++){
    const p=document.createElement("div"),s=Math.random()*2.5+1;
    p.className="p";
    p.style.cssText="width:"+s+"px;height:"+s+"px;left:"+(Math.random()*100)+"%;bottom:-5px;animation-duration:"+(Math.random()*12+8)+"s;animation-delay:"+(Math.random()*14)+"s;opacity:"+(Math.random()*0.4+0.15);
    c.appendChild(p);
  }
})();

// Counters
function countNum(el,end,suffix,ms){
  let cur=0,steps=60,step=end/steps;
  const iv=setInterval(function(){
    cur+=step;
    if(cur>=end){cur=end;clearInterval(iv);}
    el.textContent=(end>=1000?Math.floor(cur/1000)+"K+":cur.toFixed(1)+suffix);
  },ms/steps);
}
setTimeout(function(){
  countNum(document.getElementById("sv1"),50000,"",1600);
  setTimeout(function(){countNum(document.getElementById("sv2"),3.5,"%",1200);},300);
  setTimeout(function(){
    const el=document.getElementById("sv3");let n=60;
    const t=setInterval(function(){n-=2;el.textContent=n+"s";if(n<=24){el.textContent="24s";clearInterval(t);}},60);
  },500);
},1900);
</script>
