<!DOCTYPE html>
<html lang="en">
<head>
  <script src="ads.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vexora Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;width:100%;overflow:hidden;
  background:#020810;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}

/* ── BACKGROUND ── */
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, #0e264d 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 50% 110%, #08162e 0%, transparent 70%),
    #020810;
}
.bg-grid{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(201,162,39,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,162,39,0.04) 1px,transparent 1px);
  background-size:48px 48px;
  animation:gridDrift 30s linear infinite;
}
@keyframes gridDrift{from{background-position:0 0;}to{background-position:48px 48px;}}
.glow-center{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:500px;height:500px;border-radius:50%;z-index:2;pointer-events:none;
  background:radial-gradient(circle,rgba(201,162,39,0.13) 0%,rgba(14,38,77,0.08) 40%,transparent 68%);
  animation:pulseGlow 4.5s ease-in-out infinite;
}
@keyframes pulseGlow{
  0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.9;}
  50%{transform:translate(-50%,-50%) scale(1.15);opacity:0.6;}
}

/* ── PARTICLES ── */
.particles{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden;}
.p{position:absolute;border-radius:50%;background:rgba(201,162,39,0.7);animation:floatUp linear infinite;}
@keyframes floatUp{
  0%{transform:translateY(0) scale(1);opacity:0;}
  10%{opacity:1;}
  85%{opacity:0.5;}
  100%{transform:translateY(-100vh) scale(0.3);opacity:0;}
}

/* ── PAGE ── */
.page{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;
  gap:0;
}

/* ── LOGO WRAP ── */
.logo-wrap{
  position:relative;
  margin-bottom:52px;
  opacity:0;animation:zoomIn 1.1s 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.ring1{
  position:absolute;inset:-22px;border-radius:44px;
  border:1px solid rgba(201,162,39,0.22);
  animation:ringPulse 3.5s ease-in-out infinite;
}
.ring2{
  position:absolute;inset:-46px;border-radius:58px;
  border:1px solid rgba(201,162,39,0.09);
  animation:ringPulse 3.5s 1.2s ease-in-out infinite;
}
.ring3{
  position:absolute;inset:-70px;border-radius:74px;
  border:1px solid rgba(201,162,39,0.04);
  animation:ringPulse 3.5s 2.2s ease-in-out infinite;
}
@keyframes ringPulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.3;transform:scale(1.04);}
}
.logo-img{
  width:180px;height:180px;border-radius:36px;
  object-fit:cover;display:block;position:relative;z-index:1;
  box-shadow:
    0 0 0 2px rgba(201,162,39,0.3),
    0 0 60px rgba(201,162,39,0.32),
    0 0 120px rgba(201,162,39,0.12),
    0 24px 70px rgba(0,0,0,0.8);
}
.logo-shine{
  position:absolute;inset:0;border-radius:36px;z-index:2;
  background:linear-gradient(135deg,rgba(255,255,255,0.13) 0%,transparent 50%);
  pointer-events:none;
}

/* ── 3 DOTS (Facebook style) ── */
.dots{
  display:flex;align-items:center;gap:10px;
  opacity:0;animation:fadeIn 0.6s 1.2s ease forwards;
}
.dot{
  width:11px;height:11px;border-radius:50%;
  background:rgba(201,162,39,0.85);
  box-shadow:0 0 10px rgba(201,162,39,0.6);
  animation:dotBounce 1.2s ease-in-out infinite;
}
.dot:nth-child(1){animation-delay:0s;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes dotBounce{
  0%,80%,100%{transform:scale(0.55);opacity:0.35;}
  40%{transform:scale(1.15);opacity:1;}
}

/* ── UTIL ── */
@keyframes zoomIn{from{opacity:0;transform:scale(0.55);}to{opacity:1;transform:scale(1);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>
<body>

<div class="bg"></div>
<div class="bg-grid"></div>
<div class="glow-center"></div>
<div class="particles" id="ptcl"></div>

<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="ring1"></div>
    <div class="ring2"></div>
    <div class="ring3"></div>
    <img src="logo.jpeg" class="logo-img" alt="Vexora Pro">
    <div class="logo-shine"></div>
  </div>

  <!-- 3 DOTS -->
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<script>
// Particles
(function(){
  const c=document.getElementById("ptcl");
  for(let i=0;i<24;i++){
    const p=document.createElement("div"),s=Math.random()*2.5+1;
    p.className="p";
    p.style.cssText="width:"+s+"px;height:"+s+"px;left:"+(Math.random()*100)+"%;bottom:-5px;animation-duration:"+(Math.random()*12+8)+"s;animation-delay:"+(Math.random()*14)+"s;opacity:"+(Math.random()*0.4+0.15);
    c.appendChild(p);
  }
})();

// Auto redirect after 2.5 seconds
setTimeout(function(){
  window.location.href = "auth.html";
}, 2500);
</script>

</body>
</html>
