<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://upcomingperusehike.com/50/e5/57/50e557cf9cc1005d7bf547336eed1e00.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Vexora Pro — Loading...</title>

<!-- OG tags -->
<meta property="og:title"       content="Vexora Pro — Earn Money Online">
<meta property="og:description" content="Watch videos & earn Rs. 2 per video. EasyPaisa / JazzCash / USDT. Join free!">
<meta property="og:image"       content="https://ovexora-international.github.io/Online/logo.jpeg">
<meta property="og:url"         content="https://ovexora-international.github.io/Online/click.html">
<meta property="og:site_name"   content="Vexora Pro">
<meta property="og:type"        content="website">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;font-family:'Nunito',sans-serif;background:#020810;color:#fff;overflow:hidden;-webkit-font-smoothing:antialiased;}

body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 55% at 50% -10%,rgba(14,40,90,.65) 0%,transparent 65%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(201,162,39,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(201,162,39,.04) 1px,transparent 1px);background-size:44px 44px;}

/* Phases */
.ph{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;transition:opacity .35s;}
.ph.off{opacity:0;pointer-events:none;}

/* ── LOADING ── */
#ph-load{z-index:20;}
.logo-img{width:92px;height:92px;border-radius:22px;object-fit:cover;
  border:2px solid rgba(201,162,39,.3);margin-bottom:18px;
  box-shadow:0 0 40px rgba(201,162,39,.22);
  animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 36px rgba(201,162,39,.22);}50%{box-shadow:0 0 58px rgba(201,162,39,.45);}}
.v-name{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:800;letter-spacing:5px;
  background:linear-gradient(135deg,#c9a227,#f0d060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.v-pro{font-size:10px;color:#4a6080;letter-spacing:4px;text-transform:uppercase;margin-bottom:24px;}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(201,162,39,.12);
  border-top-color:#c9a227;animation:spin 1s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-size:12px;color:#4a6080;font-weight:700;letter-spacing:.5px;}

/* ── AD PHASE ── */
#ph-ad{background:#000;z-index:50;}
#ad-frame{position:fixed;inset:0;width:100%;height:100%;border:none;z-index:51;}

.ad-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:52;
  background:rgba(2,8,16,.97);backdrop-filter:blur(20px);
  border-top:2px solid rgba(201,162,39,.18);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
}
.ad-left{flex:1;min-width:0;}
.ad-lbl{font-size:9px;color:#4a6080;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px;}
.ad-num{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:800;color:#c9a227;line-height:1;transition:color .4s;}
.ad-num.done{color:#00e676;}
.ad-bar-prog{height:3px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden;margin-top:5px;}
.ad-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#9b6e14,#c9a227,#e8c547);width:0%;transition:width 30s linear;}
.ad-hint{font-size:9.5px;color:#4a6080;margin-top:4px;font-weight:600;}

.cont-btn{
  flex-shrink:0;min-width:70px;text-align:center;
  padding:12px 14px;border-radius:13px;
  font-size:11px;font-weight:800;
  cursor:not-allowed;pointer-events:none;opacity:.3;
  font-family:'Nunito',sans-serif;transition:all .35s;
  background:rgba(201,162,39,.08);
  border:1.5px solid rgba(201,162,39,.2);
  color:#c9a227;line-height:1.3;
}
.cont-btn.ready{
  cursor:pointer;pointer-events:all;opacity:1;
  background:linear-gradient(135deg,#9b6e14,#e8c547);
  color:#060f0a;border-color:transparent;
  box-shadow:0 4px 18px rgba(201,162,39,.4);
}
.cont-btn.ready:active{transform:scale(.96);}

/* ── SUCCESS ── */
#ph-ok{z-index:30;}
.ok-ico{font-size:64px;margin-bottom:14px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(0);}to{transform:scale(1);}}
.ok-title{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,#c9a227,#f0d060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:7px;}
.ok-sub{font-size:12px;color:#4a6080;margin-bottom:20px;font-weight:700;}
.ok-btn{padding:14px 32px;background:linear-gradient(135deg,#9b6e14,#e8c547);
  border:none;border-radius:14px;color:#060f0a;font-size:14px;font-weight:800;
  cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 4px 20px rgba(201,162,39,.35);}
.ok-btn:active{transform:scale(.96);}
</style>
</head>
<body>

<!-- LOADING -->
<div class="ph" id="ph-load">
  <img src="logo.jpeg" class="logo-img" alt="V" onerror="this.style.display='none'">
  <div class="v-name">VEXORA</div>
  <div class="v-pro">P &nbsp; R &nbsp; O</div>
  <div class="spin"></div>
  <div class="load-txt" id="load-msg">Preparing...</div>
</div>

<!-- AD -->
<div class="ph off" id="ph-ad">
  <iframe id="ad-frame" src=""
    sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-top-navigation"
    scrolling="yes"></iframe>
  <div class="ad-bar">
    <div class="ad-left">
      <div class="ad-lbl">⏳ Please wait</div>
      <div class="ad-num" id="ad-num">30</div>
      <div class="ad-bar-prog"><div class="ad-bar-fill" id="ad-fill"></div></div>
      <div class="ad-hint" id="ad-hint">Loading Vexora Pro...</div>
    </div>
    <button class="cont-btn" id="cont-btn" onclick="goSite()">
      ▶<br>OPEN
    </button>
  </div>
</div>

<!-- SUCCESS -->
<div class="ph off" id="ph-ok">
  <div class="ok-ico">✅</div>
  <div class="ok-title">Opening Vexora!</div>
  <div class="ok-sub">Redirecting to registration...</div>
  <button class="ok-btn" onclick="goSite()">🚀 Open Now</button>
</div>

<script>
var GAS_URL  = "https://script.google.com/macros/s/AKfycbwuDQABehGm14hy_PBoIauJYiTPljCKu44pQ88Ua5QDG2bUZ-PX5NbIwLr4hDnAlIzxfw/exec";

/* ✅ NEW SITE URL */
var SITE_URL = "https://ovexora-international.github.io/Online/auth.html";

/* ✅ ADSTERRA LINK */
var AD_URL   = "https://upcomingperusehike.com/nw01tb4n?key=52f3e6faffbb1d0c5dc9800e3d63c6cd";

var p      = new URLSearchParams(window.location.search);
var refId  = p.get("ref") || "";
var destURL= SITE_URL + (refId ? "?ref=" + encodeURIComponent(refId) : "");
var iv     = null;

window.addEventListener("DOMContentLoaded", function() {
  setMsg("Registering click...");
  /* Register click (fire & forget) */
  try {
    fetch(GAS_URL, {
      method:"POST",
      body:JSON.stringify({
        action:"register_click",
        ref_id:refId,
        ua:navigator.userAgent,
        ts:new Date().toISOString()
      })
    });
  } catch(e){}
  setMsg("Loading Vexora Pro...");
  setTimeout(showAd, 900);
});

function setMsg(t){ var e=document.getElementById("load-msg"); if(e) e.textContent=t; }

function show(id){
  ["ph-load","ph-ad","ph-ok"].forEach(function(x){
    document.getElementById(x).classList.toggle("off", x!==id);
  });
}

function showAd(){
  show("ph-ad");
  document.getElementById("ad-frame").src = AD_URL;

  var numEl  = document.getElementById("ad-num");
  var fillEl = document.getElementById("ad-fill");
  var hintEl = document.getElementById("ad-hint");
  var btnEl  = document.getElementById("cont-btn");

  var t = 30;
  /* start progress bar */
  setTimeout(function(){ fillEl.style.width="100%"; }, 80);

  iv = setInterval(function(){
    t--;
    numEl.textContent = t;
    if(t <= 0){
      clearInterval(iv);
      numEl.textContent = "✓";
      numEl.className = "ad-num done";
      hintEl.textContent = "✅ Click OPEN to continue!";
      btnEl.className = "cont-btn ready";
      btnEl.innerHTML = "🚀<br>OPEN";
      /* auto after 3s */
      setTimeout(goSite, 3000);
    }
  }, 1000);
}

function goSite(){
  clearInterval(iv);
  show("ph-ok");
  setTimeout(function(){ window.location.replace(destURL); }, 1200);
}
</script>
</body>
</html>
